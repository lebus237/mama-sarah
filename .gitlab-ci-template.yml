# Template for Node.js/PNPM build jobs
.build_template:
  image: node:20-buster
  stage: build
  variables:
    APP: ""
    NODE_VERSION: "20"
    PNPM_VERSION: "8.15.4"
    BUILD_COMMAND: "build:$APP:prod"
    PREBUILD_BUILD_COMMAND: "prebuild:$APP:prod"
    BUILD_OUTPUT_PATH: "packages/$APP/build"
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
  script:
    - rm -rf ${BUILD_OUTPUT_PATH}
    - pnpm install
    - pnpm ${PREBUILD_BUILD_COMMAND}
    - pnpm ${BUILD_COMMAND}
  cache:
    key: ${CI_COMMIT_REF_SLUG}-$APP
    paths:
      - node_modules/
      - packages/$APP/node_modules/
  artifacts:
    expire_in: 3 days

# Template for Docker push jobs
.push_template:
  image: docker:26.1.3
  stage: push
  services:
    - docker:26.1.3-dind
  variables:
    APP_TAG: ""
    DOCKERFILE: ""
    DOCKER_IMAGE_TAG: "latest"
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - docker build -t $APP_TAG -f $DOCKERFILE .
    - docker tag $APP $CI_REGISTRY_IMAGE/$APP_TAG:${DOCKER_IMAGE_TAG}
    - docker tag $APP $CI_REGISTRY_IMAGE/$APP_TAG:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/$APP_TAG:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/$APP_TAG:${DOCKER_IMAGE_TAG}

# Template for Coolify deployment
.deploy_template:
  image: alpine:latest
  stage: deploy
  variables:
    COOLIFY_WEBHOOK_URL: ""
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -X POST -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" ${COOLIFY_WEBHOOK_URL}